name: Release

# Tag-driven release: pushing `v0.4.20` (etc.) builds signed bundles for
# every supported target, generates `latest.json` (the Tauri updater
# manifest), and publishes everything to a draft GitHub Release. Review
# the draft, then click Publish — existing installs pick the update up
# on next launch via the endpoint configured in tauri.conf.json.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.12"

jobs:
  create-release:
    runs-on: ubuntu-22.04
    outputs:
      release_id: ${{ steps.create.outputs.result }}
    steps:
      - uses: actions/checkout@v4
      - name: Create draft release
        id: create
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `ChaosEngineAI ${tag}`,
              body: 'See CHANGELOG / commits for details.',
              draft: true,
              prerelease: false,
            });
            return data.id;

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: darwin
            arch: aarch64
            bundle_targets: app,dmg,updater
          - os: ubuntu-22.04
            platform: linux
            arch: x86_64
            bundle_targets: appimage,deb,updater
          - os: windows-latest
            platform: windows
            arch: x86_64
            bundle_targets: nsis,updater

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.os }})

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install npm dependencies
        working-directory: desktop
        run: npm ci

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            desktop/src-tauri/target
          key: cargo-release-${{ matrix.os }}-${{ hashFiles('desktop/src-tauri/Cargo.lock') }}
          restore-keys: cargo-release-${{ matrix.os }}-

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # Import the Developer ID cert into a temp keychain *before* the
      # Tauri build runs. Tauri normally imports it itself, but only at
      # bundle time — we need codesign available earlier, from inside our
      # `beforeBundleCommand` stage-runtime script, so it can sign the
      # hundreds of Mach-O files inside the embedded Python runtime.
      - name: Import Apple certificate (macOS)
        if: matrix.platform == 'darwin'
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 20)"

          echo "$CSC_LINK" | base64 --decode > "$RUNNER_TEMP/certificate.p12"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$RUNNER_TEMP/certificate.p12" \
            -P "$CSC_KEY_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          security set-key-partition-list \
            -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"

          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | xargs)

          IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep 'Developer ID Application' | head -1 | awk -F'"' '{print $2}')"
          if [ -z "$IDENTITY" ]; then
            echo "::error::No Developer ID Application identity found in keychain"
            security find-identity -v -p codesigning "$KEYCHAIN_PATH" || true
            exit 1
          fi
          echo "Resolved signing identity: $IDENTITY"
          echo "APPLE_SIGNING_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"
          echo "CHAOSENGINE_APPLE_SIGNING_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"

          rm -f "$RUNNER_TEMP/certificate.p12"

      - name: Create Python venv (macOS)
        if: matrix.platform == 'darwin'
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install mlx mlx-lm gguf fastapi psutil uvicorn pypdf python-multipart huggingface_hub

      - name: Create Python venv (Linux)
        if: matrix.platform == 'linux'
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install fastapi psutil uvicorn pypdf python-multipart huggingface_hub

      - name: Create Python venv (Windows)
        if: matrix.platform == 'windows'
        run: |
          python -m venv .venv
          .venv\Scripts\pip install --upgrade pip
          .venv\Scripts\pip install fastapi psutil uvicorn pypdf python-multipart huggingface_hub

      - name: Set Python embed path (Unix)
        if: matrix.platform != 'windows'
        run: echo "CHAOSENGINE_EMBED_PYTHON_BIN=${{ github.workspace }}/.venv/bin/python3" >> $GITHUB_ENV

      - name: Set Python embed path (Windows)
        if: matrix.platform == 'windows'
        run: echo "CHAOSENGINE_EMBED_PYTHON_BIN=${{ github.workspace }}\.venv\Scripts\python.exe" >> $env:GITHUB_ENV

      # Mirror the dev-mode staging override used in build.yml so we don't
      # need llama.cpp binaries in CI. Remove this once llama.cpp is built
      # alongside the release.
      - name: Override bundle command to dev mode staging
        shell: bash
        working-directory: desktop
        run: |
          node -e "
            const fs = require('fs');
            const conf = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
            conf.build.beforeBundleCommand = 'npm run stage:runtime';
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(conf, null, 2) + '\n');
          "

      - name: Build & upload (tauri-action)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Tauri updater signing
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS: cert is already imported into the temp keychain by
          # the "Import Apple certificate" step, and APPLE_SIGNING_IDENTITY
          # + CHAOSENGINE_APPLE_SIGNING_IDENTITY are already in GITHUB_ENV.
          # We only need to pass the notarization credentials here.
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: desktop
          releaseId: ${{ needs.create-release.outputs.release_id }}
          tauriScript: npx tauri
          args: --bundles ${{ matrix.bundle_targets }} --ci
          # Generates `latest.json` and uploads it as a release asset.
          updaterJsonPreferNsis: false

  publish-manifest:
    needs: [create-release, build]
    runs-on: ubuntu-22.04
    steps:
      - name: Mark release ready for review
        uses: actions/github-script@v7
        with:
          script: |
            const id = '${{ needs.create-release.outputs.release_id }}';
            core.notice(`Draft release ${id} is ready. Review the assets (including latest.json) and click Publish.`);
