name: Release

# Tag-driven release: pushing `v0.5.1` (etc.) builds signed bundles for
# every supported target, generates `latest.json` (the Tauri updater
# manifest), and publishes everything to a GitHub Release. If a release
# already exists for the tag (e.g. created manually via the UI) it reuses
# that; otherwise it creates a new draft.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to publish when triggering manually (for example: v0.5.1)"
        required: true
        type: string

permissions:
  contents: write

env:
  NODE_VERSION: "24"
  PYTHON_VERSION: "3.12"

jobs:
  create-release:
    runs-on: ubuntu-22.04
    outputs:
      release_id: ${{ steps.find-or-create.outputs.result }}
    steps:
      - uses: actions/checkout@v6
      - name: Find or create release
        id: find-or-create
        uses: actions/github-script@v8
        with:
          script: |
            // Tag pushes already provide refs/tags/vX.Y.Z. Manual dispatches do not,
            // so require an explicit tag input instead of guessing from the branch ref.
            const dispatchTag = `${{ inputs.release_tag || '' }}`.trim();
            const tag = context.eventName === 'workflow_dispatch'
              ? dispatchTag
              : context.ref.replace('refs/tags/', '');

            if (!tag) {
              core.setFailed('Missing release tag. Provide workflow_dispatch input release_tag or push a vX.Y.Z tag.');
              return;
            }

            // Check if a release already exists for this tag
            try {
              const { data } = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag: tag,
              });
              core.notice(`Found existing release ${data.id} for tag ${tag}`);
              return data.id;
            } catch (e) {
              if (e.status !== 404) throw e;
            }

            // Draft releases can be awkward to resolve by tag through the REST
            // tag lookup, so fall back to scanning releases for the matching tag.
            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });
            const existingDraft = releases.find((release) => release.tag_name === tag);
            if (existingDraft) {
              core.notice(`Found existing release ${existingDraft.id} for tag ${tag} via release list`);
              return existingDraft.id;
            }

            // No existing release — create a draft
            const releasePayload = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `ChaosEngineAI ${tag}`,
              body: 'See CHANGELOG / commits for details.',
              draft: true,
              prerelease: false,
            };
            if (context.eventName === 'workflow_dispatch') {
              releasePayload.target_commitish = context.sha;
            }
            const { data } = await github.rest.repos.createRelease(releasePayload);
            core.notice(`Created draft release ${data.id} for tag ${tag}`);
            return data.id;

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: darwin
            arch: aarch64
            bundle_targets: app,dmg
          - os: ubuntu-22.04
            platform: linux
            arch: x86_64
            bundle_targets: appimage,deb
          - os: windows-latest
            platform: windows
            arch: x86_64
            bundle_targets: nsis

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.os }})

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Install Linux system dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install npm dependencies
        run: npm ci

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-release-${{ matrix.os }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: cargo-release-${{ matrix.os }}-

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Import Apple certificate (macOS)
        if: matrix.platform == 'darwin'
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 20)"

          echo "$CSC_LINK" | base64 --decode > "$RUNNER_TEMP/certificate.p12"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$RUNNER_TEMP/certificate.p12" \
            -P "$CSC_KEY_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          security set-key-partition-list \
            -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"

          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | xargs)

          IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep 'Developer ID Application' | head -1 | awk -F'"' '{print $2}')"
          if [ -z "$IDENTITY" ]; then
            echo "::error::No Developer ID Application identity found in keychain"
            security find-identity -v -p codesigning "$KEYCHAIN_PATH" || true
            exit 1
          fi
          echo "Resolved signing identity: $IDENTITY"
          echo "APPLE_SIGNING_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"
          echo "CHAOSENGINE_APPLE_SIGNING_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"

          rm -f "$RUNNER_TEMP/certificate.p12"

      - name: Create Python venv (macOS)
        if: matrix.platform == 'darwin'
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install mlx mlx-lm gguf fastapi psutil uvicorn "pypdf>=6.10.2" python-multipart huggingface_hub

      - name: Create Python venv (Linux)
        if: matrix.platform == 'linux'
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install fastapi psutil uvicorn "pypdf>=6.10.2" python-multipart huggingface_hub

      - name: Create Python venv (Windows)
        if: matrix.platform == 'windows'
        run: |
          python -m venv .venv
          .venv\Scripts\pip install --upgrade pip
          .venv\Scripts\pip install fastapi psutil uvicorn "pypdf>=6.10.2" python-multipart huggingface_hub

      - name: Set Python embed path (Unix)
        if: matrix.platform != 'windows'
        run: echo "CHAOSENGINE_EMBED_PYTHON_BIN=${{ github.workspace }}/.venv/bin/python3" >> $GITHUB_ENV

      - name: Set Python embed path (Windows)
        if: matrix.platform == 'windows'
        run: echo "CHAOSENGINE_EMBED_PYTHON_BIN=${{ github.workspace }}\.venv\Scripts\python.exe" >> $env:GITHUB_ENV

      - name: Override bundle command to dev mode staging
        shell: bash
        run: |
          node -e "
            const fs = require('fs');
            const conf = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
            conf.build.beforeBundleCommand = 'npm run stage:runtime';
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(conf, null, 2) + '\n');
          "

      - name: Build & upload (tauri-action)
        uses: tauri-apps/tauri-action@v0.6.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          tagName: ${{ inputs.release_tag || github.ref_name }}
          tauriScript: npx tauri
          args: --bundles ${{ matrix.bundle_targets }} --ci
          includeUpdaterJson: false
          updaterJsonPreferNsis: false

  publish-manifest:
    needs: [create-release, build]
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Generate combined updater manifest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_ID: ${{ needs.create-release.outputs.release_id }}
          RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node ./scripts/generate-updater-manifest.mjs
      - name: Mark release ready for review
        uses: actions/github-script@v8
        with:
          script: |
            const id = '${{ needs.create-release.outputs.release_id }}';
            core.notice(`Draft release ${id} is ready. Review the assets (including latest.json) and click Publish.`);
