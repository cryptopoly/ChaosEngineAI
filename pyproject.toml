[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta:__legacy__"

[project]
name = "chaosengine-ai"
version = "0.5.3"
description = "Local AI model runner with pluggable cache/compression strategies"
readme = "README.md"
license = {text = "Apache-2.0"}
requires-python = ">=3.10"
dependencies = []

[project.scripts]
chaosengine-api = "backend_service.app:main"

[project.optional-dependencies]
dev = [
    "pytest",
]
mlx-lm = [
    "mlx>=0.22.0",
    "gguf>=0.18.0",
    "mlx-lm>=0.22.0",
]
triattention = ["triattention>=0.1.0", "vllm>=0.8.0"]
rotorquant = ["turboquant>=0.2.0"]
turboquant = ["turboquant-mlx-full>=0.1.0"]
vllm = ["vllm>=0.8.0"]
dflash-mlx = ["dflash-mlx @ git+https://github.com/bstnxbt/dflash-mlx.git@v0.1.4"]
dflash = ["dflash>=0.1.0"]
desktop = [
    "fastapi>=0.115.0",
    "huggingface-hub>=0.26.0",
    "pypdf>=6.10.2",
    "psutil>=5.9.0",
    "python-multipart>=0.0.9",
    "uvicorn>=0.30.0",
]
images = [
    "accelerate>=0.34.0",
    "diffusers>=0.30.0",
    "huggingface-hub>=0.26.0",
    "pillow>=10.4.0",
    "safetensors>=0.4.5",
    "torch>=2.4.0",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--tb=short -q"

[tool.setuptools.packages.find]
include = ["backend_service*", "cache_compression*", "dflash*"]
